# Co-hostable production stack: the scanner app + a Cloudflare Tunnel.
#
# No inbound ports are opened on the droplet. cloudflared makes an OUTBOUND
# connection to Cloudflare, which serves https://scanner.yourdomain.com and
# routes it to app:3000 over the internal network. This avoids the 80/443
# conflict with any other app already on the droplet, and hides the origin IP.
#
# Setup (see DEPLOY.md):
#   1. Create a tunnel in Cloudflare  (Zero Trust > Networks > Tunnels).
#   2. Add a Public Hostname -> Service: HTTP  app:3000  and copy the token.
#   3. cp .env.example .env  and set CLOUDFLARE_TUNNEL_TOKEN, PUBLIC_BASE_URL, keys.
#   4. docker compose up -d --build

services:
  app:
    build: .
    image: rugsonar-app
    restart: unless-stopped
    env_file: .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      - scandata:/app/data
    expose:
      - "3000"

  # Telegram bot — reuses the app image, calls the scanner over the internal
  # network (no inbound ports). Idles quietly until TELEGRAM_BOT_TOKEN is set.
  bot:
    image: rugsonar-app
    restart: unless-stopped
    env_file: .env
    command: npm run start -w bot
    depends_on:
      - app

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  scandata:
